# Reference shape of the delta applied on top of the padring fork's
# `librelane/config.yaml` to teach LibreLane about the two user
# macros (counter + alu_macro). Shows the expected structure; the
# notebook `04_counter_alu_multimacro.ipynb` actually builds and
# writes the merged config at run time with absolute paths resolved
# to the hardening output directories (`<HOST_MULTIMACRO>/build/...`).
#
# The chip_top.sv of the fork instantiates chip_core as `i_chip_core`;
# our chip_core_multi.sv labels the two user-macro instances
# `u_counter` and `u_alu`, hence the dotted hierarchical names below.
#
# Path layout: librelane --save-views-to <dir> writes
#   <dir>/gds/<name>.gds
#   <dir>/lef/<name>.lef
#   <dir>/nl/<name>.nl.v                   (logical netlist, no VDD/VSS)
#   <dir>/lib/<corner>/<name>.lib
# There is NO additional 'final/' prefix.

VERILOG_FILES:
  - dir::../src/chip_top.sv    # unchanged upstream padring wiring
  - dir::../src/chip_core.sv   # = chip_core_multi.sv after the notebook swap
# counter / alu_macro deliberately omitted -- they are hard macros
# (MACROS below). Adding them would re-synthesise into stdcells.

MACROS:
  # NOTE on lib: map per-corner libs keyed by GF180 corner IDs
  # ({nom,min,max}_{tt_025C_5v00,ss_125C_4v50,ff_n40C_5v50}, 9 total).
  # Using "*" with a single .lib file silently reduces multi-corner STA
  # to single-corner.  The notebook builds the full 9-entry map.
  counter:
    gds: ["<HOST_MULTIMACRO>/build/counter/gds/counter.gds"]
    lef: ["<HOST_MULTIMACRO>/build/counter/lef/counter.lef"]
    vh:  ["<HOST_MULTIMACRO>/build/counter/nl/counter.nl.v"]
    lib:
      nom_tt_025C_5v00: ["<HOST_MULTIMACRO>/build/counter/lib/nom_tt_025C_5v00/counter__nom_tt_025C_5v00.lib"]
      # ... 8 more corners, one lib each
    instances:
      "i_chip_core.u_counter":
        location: [1000, 1000]
        orientation: N

  alu_macro:
    gds: ["<HOST_MULTIMACRO>/build/alu_macro/gds/alu_macro.gds"]
    lef: ["<HOST_MULTIMACRO>/build/alu_macro/lef/alu_macro.lef"]
    vh:  ["<HOST_MULTIMACRO>/build/alu_macro/nl/alu_macro.nl.v"]
    lib:
      nom_tt_025C_5v00: ["<HOST_MULTIMACRO>/build/alu_macro/lib/nom_tt_025C_5v00/alu_macro__nom_tt_025C_5v00.lib"]
      # ... 8 more corners
    instances:
      "i_chip_core.u_alu":
        location: [1800, 1000]
        orientation: N

# Added on top of the fork's existing PDN_MACRO_CONNECTIONS (empty
# list) so chip_id / logo stay covered by the default macro grid.
# Format: list of strings "<regex> <vdd_net> <vss_net> <vdd_pin> <vss_pin>".
# A dict {inst_regex: ..., power: ..., ground: ...} is REJECTED by v3.0.2.
PDN_MACRO_CONNECTIONS:
  - ".*u_counter.* VDD VSS VDD VSS"
  - ".*u_alu.*     VDD VSS VDD VSS"
